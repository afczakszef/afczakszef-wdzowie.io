<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vxaj | Linki</title>

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
background-size:400% 400%;
animation:bgMove 15s ease infinite;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
text-align:center;
width:340px;
}

.avatar{
width:120px;
height:120px;
border-radius:50%;
margin:auto;
background:url('https://yt3.googleusercontent.com/ytc/AIf8zZQ-placeholder=s176-c-k-c0x00ffffff-no-rj') center/cover;
border:4px solid rgba(255,255,255,0.2);
box-shadow:0 0 25px rgba(255,255,255,0.2);
animation:float 5s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

h1{
margin-top:15px;
margin-bottom:5px;
font-size:28px;
letter-spacing:1px;
}

p{
opacity:0.7;
margin-bottom:30px;
}

.link{
display:block;
padding:15px;
margin:12px 0;
border-radius:14px;
text-decoration:none;
font-weight:bold;
transition:0.25s;
position:relative;
overflow:hidden;
}

.link:hover{
transform:scale(1.07);
}

.youtube{
background:#ff0000;
box-shadow:0 0 15px rgba(255,0,0,0.7);
color:white;
}

.discord{
background:#5865F2;
box-shadow:0 0 15px rgba(88,101,242,0.7);
color:white;
}

.link::after{
content:"";
position:absolute;
left:-100%;
top:0;
width:100%;
height:100%;
background:rgba(255,255,255,0.25);
transition:0.4s;
}

.link:hover::after{
left:100%;
}

footer{
margin-top:25px;
font-size:12px;
opacity:0.6;
}

/* particles */
.particle{
position:absolute;
width:3px;
height:3px;
background:white;
opacity:0.6;
border-radius:50%;
animation:particleMove linear infinite;
}

@keyframes particleMove{
from{transform:translateY(0)}
to{transform:translateY(-110vh)}
}
</style>
</head>

<body>

<script>
for(let i=0;i<50;i++){
const p=document.createElement('div');
p.className='particle';
p.style.left=Math.random()*100+'vw';
p.style.bottom='-10px';
p.style.animationDuration=(6+Math.random()*10)+'s';
p.style.opacity=Math.random();
document.body.appendChild(p);
}
</script>

<div class="container">

<div class="avatar"></div>

<h1>Vxaj</h1>
<p>Moje linki</p>

<a class="link youtube" href="https://www.youtube.com/@Vxajjj" target="_blank">🎥 YouTube</a>

<a class="link discord" href="https://discord.gg/cBBqEYN8" target="_blank">💬 Discord</a>

<footer>
© 2026 Vxaj
</footer>

</div>

</body>
</html>
