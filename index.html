<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strona AFC Zakszef</title>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 0;
        background: #1a1a1a;
        color: #fff;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
    }

    header {
        background: #ff0000;
        padding: 20px;
        text-align: center;
    }

    header h1 {
        margin: 0;
        font-size: 2em;
    }

    .links {
        margin-top: 10px;
    }

    .links a {
        color: #fff;
        text-decoration: none;
        margin: 0 10px;
        font-weight: bold;
        transition: color 0.3s;
    }

    .links a:hover {
        color: #ffd700;
    }

    .subscriber-count {
        margin-top: 10px;
        font-size: 1.2em;
    }

    main {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 50px 20px;
        text-align: center;
    }

    footer {
        background: #333;
        padding: 20px;
        text-align: center;
        font-size: 1.1em;
    }

    .episode {
        margin-top: 10px;
        font-weight: bold;
        color: #ffd700;
    }
</style>
</head>
<body>
    <header>
        <h1>AFC Zakszef</h1>
        <div class="links">
            <a href="https://youtube.com/@afczakszef_1?si=nncYl0Hn-ddnwyZH" target="_blank">Mój YouTube</a>
            <a href="https://discord.gg/VkQJNQBe" target="_blank">Discord</a>
        </div>
        <div class="subscriber-count" id="subCount">Subskrybenci: 0</div>
    </header>

    <main>
        <div>
            <h2>Witaj na mojej stronie!</h2>
            <p>Tu znajdziesz najnowsze odcinki i aktualności.</p>
        </div>
    </main>

    <footer>
        Nowy odcinek: <span class="episode" id="latestEpisode">Jeszcze nie dodano</span>
    </footer>

<script>
    // --- Licznik subów YouTube ---
    const apiKey = "TUTAJ_WSTAW_SWÓJ_API_KEY";
    const channelId = "UCN6V5qEv4f1WmHh9yM1ZyPQ"; // Twój channel ID
    async function fetchSubs() {
        try {
            const response = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${channelId}&key=${apiKey}`);
            const data = await response.json();
            const count = data.items[0].statistics.subscriberCount;
            document.getElementById("subCount").textContent = `Subskrybenci: ${count}`;
        } catch (error) {
            console.error(error);
        }
    }
    fetchSubs();

    // --- Aktualizacja odcinka ---
    function updateEpisode(title) {
        document.getElementById("latestEpisode").textContent = title;
    }

    // Przykład: gdy wstawisz nowy odcinek
    updateEpisode("Odcinek 1: Start serii!");
</script>
</body>
</html>
