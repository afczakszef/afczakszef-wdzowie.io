<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moja Strona</title>
    <style>
        /* Ogólne tło gradientowe */
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            color: #fff;
            text-align: center;
            padding: 50px 20px;
            min-height: 100vh;
        }

        h1 {
            color: #f39c12;
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            animation: fadeIn 1.5s ease-in-out;
        }

        h2 {
            margin-top: 40px;
            color: #ffd700;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        /* Styl linków */
        .links a {
            display: inline-block;
            margin: 15px;
            padding: 15px 30px;
            background: linear-gradient(45deg, #7289da, #99a9f0);
            color: white;
            text-decoration: none;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1.1em;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        .links a.youtube {
            background: linear-gradient(45deg, #FF0000, #FF4C4C);
        }

        .links a:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            opacity: 0.9;
        }

        /* Kontener wideo */
        .video-container {
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        iframe {
            border: none;
            width: 100%;
            max-width: 640px;
            height: 360px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }

        iframe:hover {
            transform: scale(1.02);
        }

        /* Animacja nagłówka */
        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(-20px);}
            to {opacity: 1; transform: translateY(0);}
        }

        /* Responsywność */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.2em;
            }
            iframe {
                height: 200px;
            }
            .links a {
                padding: 12px 20px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>

    <h1>Witaj na mojej stronie!</h1>

    <div class="links">
        <a href="https://discord.gg/VkQJNQBe" target="_blank">Dołącz do Discorda</a>
        <a href="https://youtube.com/@afczakszef_1?si=pRBKA7ADILNb2tJ_" target="_blank" class="youtube">Mój YouTube</a>
    </div>

    <div class="video-container">
        <h2>Najnowszy odcinek:</h2>
        <iframe id="latest-video" src="" allowfullscreen></iframe>
    </div>

    <script>
        const channelId = "UCXXXXXXX"; // <- Wstaw prawdziwe ID kanału
        const apiKey = "TU_WSTAW_SWÓJ_API_KEY_YOUTUBE"; // <- Wstaw swój API Key

        async function loadLatestVideo() {
            try {
                const response = await fetch(`https://www.googleapis.com/youtube/v3/search?key=${apiKey}&channelId=${channelId}&order=date&part=snippet&type=video&maxResults=1`);
                const data = await response.json();

                if(data.items && data.items.length > 0) {
                    const videoId = data.items[0].id.videoId;
                    document.getElementById("latest-video").src = `https://www.youtube.com/embed/${videoId}`;
                } else {
                    console.error("Nie znaleziono filmów na kanale.");
                }
            } catch (err) {
                console.error("Błąd ładowania filmu:", err);
            }
        }

        loadLatestVideo();
    </script>

</body>
</html>
