<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>afczakszef_yt</title>
<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0f172a;
color:white;
}

header{
text-align:center;
padding:40px 20px;
}

h1{font-size:40px;margin:0}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
padding:30px;
max-width:1100px;
margin:auto;
}

.card{
background:#1e293b;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.btn{
display:inline-block;
margin-top:15px;
padding:12px 22px;
background:#5865F2;
border-radius:10px;
color:white;
text-decoration:none;
font-weight:bold;
}

#videos{
max-width:1100px;
margin:auto;
padding:20px;
}

.video{
background:#1e293b;
padding:15px;
margin-bottom:15px;
border-radius:15px;
}

iframe{max-width:100%}

footer{
text-align:center;
padding:30px;
opacity:0.7;
}
</style>
</head>
<body>

<header>
<h1>AFCZAKSZEF YT</h1>
<p>Oficjalna strona mojego kanału</p>
</header>

<div class="container">

<div class="card">
<h2>Discord</h2>
<p>Dołącz do mojego serwera</p>
<a class="btn" href="https://discord.gg/XWQGd4zY" target="_blank">Wejdź na Discord</a>
</div>

<div class="card">
<h2>Mój kanał YouTube</h2>
<p>Subskrybuj mój kanał</p>

<iframe src="https://livecounts.io/embed/youtube-live-subscriber-counter/UC" width="100%" height="120"></iframe>

<a class="btn" href="https://youtube.com/@afczakszef_1" target="_blank">Otwórz kanał</a>
</div>

</div>

<section id="videos">
<h2>Najnowsze odcinki</h2>
<div id="videoList"></div>
</section>

<footer>
afczakszef_yt © 2026
</footer>

<script>
const channelId = "UC"; // tu można wstawić ID kanału jeśli będziesz chciał

const rssUrl = "https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=" + channelId;

fetch(rssUrl)
.then(res => res.json())
.then(data => {
const container = document.getElementById("videoList");

let count = 0;

for(const item of data.items){

if(count >= 5) break;

if(item.title.toLowerCase().includes("short")) continue;

const videoId = item.link.split("v=")[1];

const div = document.createElement("div");
div.className = "video";

div.innerHTML = `
<h3>${item.title}</h3>
<iframe width="560" height="315" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>
`;

container.appendChild(div);
count++;
}
});
</script>

</body>
</html>
